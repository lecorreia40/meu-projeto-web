# Render Blueprint for the Mesa backend API.
# In Render: New + → "Blueprint" → connect this repo → it reads this file.
# After deploy, set ADMIN_PASSWORD and CORS_ORIGINS in the service's Environment.
services:
  - type: web
    name: mesa-api
    runtime: python
    plan: free
    branch: claude/fundo-yf0a90
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LIVE_TRADING_ENABLED
        value: "false"
      - key: EXECUTION_MODE
        value: paper
      - key: ADMIN_USERNAME
        value: owner
      # Set your own password in the Render dashboard (kept secret).
      - key: ADMIN_PASSWORD
        sync: false
      # A strong random signing key is generated by Render.
      - key: AUTH_SECRET
        generateValue: true
      # Set this to your frontend URL (e.g. https://mesa.vercel.app) after the
      # frontend is deployed, so the browser panel is allowed to call the API.
      - key: CORS_ORIGINS
        sync: false
