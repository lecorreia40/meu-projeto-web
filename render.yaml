# Render Blueprint — deploys BOTH services for Mesa Proprietária com IA:
#   * mesa-api   — FastAPI backend (Python)
#   * mesa-panel — Next.js admin panel (Node)
#
# One click: render.com → New + → Blueprint → connect this repo. Render reads
# this file and creates both services. You only set ADMIN_PASSWORD.
# CORS is handled automatically (the panel runs on *.onrender.com).
services:
  # --- Backend API -----------------------------------------------------------
  - type: web
    name: mesa-api
    runtime: python
    plan: free
    branch: claude/fundo-yf0a90
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LIVE_TRADING_ENABLED
        value: "false"
      - key: EXECUTION_MODE
        value: paper
      - key: ADMIN_USERNAME
        value: owner
      # Set your own password in the Render dashboard (kept secret).
      - key: ADMIN_PASSWORD
        sync: false
      # Strong random signing key, generated by Render.
      - key: AUTH_SECRET
        generateValue: true
      # Allow the panel (any *.onrender.com origin) to call the API — no manual
      # URL paste needed. The API is still protected by login/token.
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.onrender\.com
      # --- Market data ------------------------------------------------------
      # Default is the deterministic mock feed (no cost, fully offline). To use
      # REAL data, set MARKET_DATA_PROVIDER=alpaca and fill the two keys below
      # in the Render dashboard. If the provider is set but keys are missing,
      # the feed fails closed (the desk never invents prices).
      - key: MARKET_DATA_PROVIDER
        value: mock
      - key: MARKET_DATA_API_KEY
        sync: false
      - key: MARKET_DATA_API_SECRET
        sync: false

  # --- Frontend admin panel (Next.js) ---------------------------------------
  - type: web
    name: mesa-panel
    runtime: node
    plan: free
    branch: claude/fundo-yf0a90
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT -H 0.0.0.0
    envVars:
      # The API service got a suffixed URL (the plain "mesa-api" name was taken),
      # so point the panel at the real URL explicitly. (Update this if you
      # recreate the API service and its URL changes.)
      - key: NEXT_PUBLIC_API_URL
        value: https://mesa-api-01ke.onrender.com
